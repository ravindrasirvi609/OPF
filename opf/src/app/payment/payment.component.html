<form [formGroup]="paymentForm" (ngSubmit)="onSubmit()">
    <div>
      <label for="amount">Amount:</label>
      <input type="number" id="amount" formControlName="amount" required>
    </div>
    <div>
      <label for="currency">Currency:</label>
      <input type="text" id="currency" formControlName="currency" required>
    </div>
    <div>
      <label for="receipt">Receipt:</label>
      <input type="text" id="receipt" formControlName="receipt" required>
    </div>
    <button type="submit" [disabled]="paymentForm.invalid">Submit</button>
  </form>
